<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Assignment</title>

        <style>
            body {
                font-family: sf pro text, -apple-system, BlinkMacSystemFont, Roboto, segoe ui, Helvetica, Arial,
                    sans-serif, apple color emoji, segoe ui emoji, segoe ui symbol;
                font-weight: 400;
                line-height: 22.4px;
                font-size: 16px;
            }
            p,
            ul,
            ol {
                font-size: 16px;
                font-weight: 400;
            }
            h1,
            h2,
            h3,
            h4,
            h5,
            h6 {
                font-weight: bold;
            }
            ul {
                list-style: none;
                margin: 0;
                padding: 0;
                max-width: none;
            }
            .code-snippet {
                background-color: #fff;
                border: 1px solid #d1d7dc;
                color: #b4690e;
                font-size: 90%;
                padding: 0.2rem 0.4rem;
            }
            .code-block {
                background-color: #fff;
                color: #b4690e;
                font-size: 90%;
            }
            .black-block {
                color: #000000;
            }
            .italic-text {
                font-style: italic;
            }
        </style>
    </head>

    <body onload="main()">
        <h1 id="assignment-title"></h1>
        <div>
            <h2>Description</h2>
            <div id="assignment-description"></div>
            <p><strong>Estimated Duration:</strong> <span id="assignment-duration"></span> minutes</p>
        </div>
        <div>
            <h2>Instructions</h2>
            <div id="assignment-instructions"></div>
        </div>
        <div>
            <h2>Questions and Solutions</h2>
            <div id="assignment-questions"></div>
        </div>
        <div id="assignment-instructor-solutions"></div>

        <script>
            const quizData = __data_placeholder__;

            function renderQuestions(rootElement, questions) {
                for (var i = 0; i < questions.length; i++) {
                    var elem = questions[i];
                    var jsElem = document.createElement("div");
                    jsElem.className = "assignment-question";
                    
                    var jsElemTitle = document.createElement("h3");
                    jsElemTitle.innerHTML = "Question " + (i + 1);
                    
                    var jsElemBody = document.createElement("div");
                    jsElemBody.innerHTML = elem.body;
                    
                    var jsElemAnswerTitle = document.createElement("h4");
                    jsElemAnswerTitle.innerHTML = "Solution";
                    
                    var jsElemAnswer = document.createElement("div");
                    jsElemAnswer.innerHTML = elem.answer;

                    jsElem.appendChild(jsElemTitle);
                    jsElem.appendChild(jsElemBody);
                    jsElem.appendChild(jsElemAnswerTitle);
                    jsElem.appendChild(jsElemAnswer);
                    rootElement.appendChild(jsElem);
                }
            }

            function main() {
                var assignmentTitle = document.getElementById("assignment-title");
                assignmentTitle.innerHTML = quizData.title;

                var assignmentDescription = document.getElementById("assignment-description");
                assignmentDescription.innerHTML = quizData.description;

                var assignmentDuration = document.getElementById("assignment-duration");
                assignmentDuration.innerHTML = quizData.estimated_duration;

                var assignmentInstructions = document.getElementById("assignment-instructions");
                if (quizData.instructions && quizData.instructions.length > 0) {
                    var instHtml = "";
                    var assetHtml = "";
                    for (var i = 0; i < quizData.instructions.length; i++) {
                        if (quizData.instructions[i].body) {
                            instHtml += quizData.instructions[i].body;
                        }
                        if (quizData.instructions[i].asset) {
                            assetHtml += '<p><strong>Attachment: </strong>' + quizData.instructions[i].asset.title + '</p>';
                        }
                    }
                    assignmentInstructions.innerHTML = instHtml + assetHtml;
                } else {
                    assignmentInstructions.innerHTML = '<span class="italic-text">No instructions provided</span>';
                }

                var assignmentQuestions = document.getElementById("assignment-questions");
                if (!quizData.questions || quizData.questions.length === 0) {
                    assignmentQuestions.innerHTML = '<span class="italic-text">No questions provided</span>';
                } else {
                    renderQuestions(assignmentQuestions, quizData.questions);
                }

                var assignmentSolutions = document.getElementById("assignment-instructor-solutions");
                if (quizData.solutions && quizData.solutions.length > 0) {
                    var solHtml = "<h2>Instructor Solutions</h2>";
                    for (var i = 0; i < quizData.solutions.length; i++) {
                        if (quizData.solutions[i].body) {
                            solHtml += quizData.solutions[i].body;
                        }
                        if (quizData.solutions[i].asset) {
                            solHtml += '<p><strong>Attachment: </strong>' + quizData.solutions[i].asset.title + '</p>';
                        }
                    }
                    assignmentSolutions.innerHTML = solHtml;
                }
            }
        </script>
    </body>
</html>
